<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulação Navier-Stokes - IMPA Tech</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; cursor: crosshair; }
        .ui { position: absolute; top: 10; left: 10; pointer-events: none; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>
    <div class="ui">
        <b>Navier-Stokes: Gás Ascendente</b><br>
        Mova o mouse para interagir
    </div>
    <canvas id="canvas"></canvas>

<script>
/**
 * Implementação simplificada de Stable Fluids (Jos Stam)
 * Adaptada para Computação Gráfica - IMPA Tech
 */

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const N = 128; 
const iter = 10;
const size = (N + 2) * (N + 2);

// Arrays de estado
let dens = new Float32Array(size).fill(0);    // Densidade
let dens_prev = new Float32Array(size).fill(0);
let u = new Float32Array(size).fill(0);       // Velocidade X
let u_prev = new Float32Array(size).fill(0);
let v = new Float32Array(size).fill(0);       // Velocidade Y
let v_prev = new Float32Array(size).fill(0);

// Auxiliares de mouse
let mouseX = 0, mouseY = 0, pmouseX = 0, pmouseY = 0;
canvas.onmousemove = e => {
    pmouseX = mouseX; pmouseY = mouseY;
    mouseX = e.clientX; mouseY = e.clientY;
};

function IX(i, j) { 
    i = Math.max(0, Math.min(N + 1, i));
    j = Math.max(0, Math.min(N + 1, j));
    return i + (N + 2) * j; 
}

function addSource(x, s, dt) {
    for (let i = 0; i < size; i++) x[i] += dt * s[i];
}

function setBoundary(b, x) {
    for (let i = 1; i <= N; i++) {
        x[IX(0, i)] = b === 1 ? -x[IX(1, i)] : x[IX(1, i)];
        x[IX(N + 1, i)] = b === 1 ? -x[IX(N, i)] : x[IX(N, i)];
        x[IX(i, 0)] = b === 2 ? -x[IX(i, 1)] : x[IX(i, 1)];
        x[IX(i, N + 1)] = b === 2 ? -x[IX(i, N)] : x[IX(i, N)];
    }
}

function diffuse(b, x, x0, diff, dt) {
    let a = dt * diff * N * N;
    for (let k = 0; k < iter; k++) {
        for (let i = 1; i <= N; i++) {
            for (let j = 1; j <= N; j++) {
                x[IX(i, j)] = (x0[IX(i, j)] + a * (x[IX(i - 1, j)] + x[IX(i + 1, j)] + x[IX(i, j - 1)] + x[IX(i, j + 1)])) / (1 + 4 * a);
            }
        }
        setBoundary(b, x);
    }
}

function advect(b, d, d0, u, v, dt) {
    let dt0 = dt * N;
    for (let i = 1; i <= N; i++) {
        for (let j = 1; j <= N; j++) {
            let x = i - dt0 * u[IX(i, j)];
            let y = j - dt0 * v[IX(i, j)];
            if (x < 0.5) x = 0.5; if (x > N + 0.5) x = N + 0.5;
            let i0 = Math.floor(x); let i1 = i0 + 1;
            if (y < 0.5) y = 0.5; if (y > N + 0.5) y = N + 0.5;
            let j0 = Math.floor(y); let j1 = j0 + 1;
            let s1 = x - i0; let s0 = 1 - s1;
            let t1 = y - j0; let t0 = 1 - t1;
            d[IX(i, j)] = s0 * (t0 * d0[IX(i0, j0)] + t1 * d0[IX(i0, j1)]) +
                         s1 * (t0 * d0[IX(i1, j0)] + t1 * d0[IX(i1, j1)]);
        }
    }
    setBoundary(b, d);
}

function project(u, v, p, div) {
    for (let i = 1; i <= N; i++) {
        for (let j = 1; j <= N; j++) {
            div[IX(i, j)] = -0.5 * (u[IX(i + 1, j)] - u[IX(i - 1, j)] + v[IX(i, j + 1)] - v[IX(i, j - 1)]) / N;
            p[IX(i, j)] = 0;
        }
    }
    setBoundary(0, div); setBoundary(0, p);
    for (let k = 0; k < iter; k++) {
        for (let i = 1; i <= N; i++) {
            for (let j = 1; j <= N; j++) {
                p[IX(i, j)] = (div[IX(i, j)] + p[IX(i - 1, j)] + p[IX(i + 1, j)] + p[IX(i, j - 1)] + p[IX(i, j + 1)]) / 4;
            }
        }
        setBoundary(0, p);
    }
    for (let i = 1; i <= N; i++) {
        for (let j = 1; j <= N; j++) {
            u[IX(i, j)] -= 0.5 * N * (p[IX(i + 1, j)] - p[IX(i - 1, j)]);
            v[IX(i, j)] -= 0.5 * N * (p[IX(i, j + 1)] - p[IX(i, j - 1)]);
        }
    }
    setBoundary(1, u); setBoundary(2, v);
}

function update() {
    const dt = 0.1;
    const diff = 0.0001;
    const visc = 0.0001;

    // Resetar forças externas
    u_prev.fill(0); v_prev.fill(0); dens_prev.fill(0);

    // Injeção de Gás na base (Fluxo constante para cima)
    for(let i = N/2 - 5; i < N/2 + 5; i++) {
        dens_prev[IX(i, N - 2)] = 10; // Fonte de fumaça
        v_prev[IX(i, N - 2)] = -5;    // Empuxo inicial (Y negativo sobe)
    }

    let mI = Math.floor((mouseX / window.innerWidth) * N);
    let mJ = Math.floor((mouseY / window.innerHeight) * N);
    if(mI > 0 && mI <= N && mJ > 0 && mJ <= N) {
        u_prev[IX(mI, mJ)] = (mouseX - pmouseX) * 2;
        v_prev[IX(mI, mJ)] = (mouseY - pmouseY) * 2;
        dens_prev[IX(mI, mJ)] = 5;
    }

    // Passo da Velocidade
    addSource(u, u_prev, dt); addSource(v, v_prev, dt);
    [u, u_prev] = [u_prev, u]; diffuse(1, u, u_prev, visc, dt);
    [v, v_prev] = [v_prev, v]; diffuse(2, v, v_prev, visc, dt);
    project(u, v, u_prev, v_prev);
    [u, u_prev] = [u_prev, u]; [v, v_prev] = [v_prev, v];
    advect(1, u, u_prev, u_prev, v_prev, dt);
    advect(2, v, v_prev, u_prev, v_prev, dt);
    project(u, v, u_prev, v_prev);

    // Passo da Densidade
    addSource(dens, dens_prev, dt);
    [dens, dens_prev] = [dens_prev, dens]; diffuse(0, dens, dens_prev, diff, dt);
    [dens, dens_prev] = [dens_prev, dens]; advect(0, dens, dens_prev, u, v, dt);
}

function draw() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const scaleX = canvas.width / N;
    const scaleY = canvas.height / N;

    for (let i = 1; i <= N; i++) {
        for (let j = 1; j <= N; j++) {
            let d = dens[IX(i, j)];
            if (d > 0) {
                let r = Math.min(255, d * 255);
                let g = Math.min(255, d * 150);
                let b = Math.min(255, d * 50);
                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.fillRect((i - 1) * scaleX, (j - 1) * scaleY, scaleX + 1, scaleY + 1);
            }
        }
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
