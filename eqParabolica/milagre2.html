<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PE Acústica 2D</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#020812;
    color:white;
    font-family:Arial;
}

canvas{
    display:block;
    width:100vw;
    height:100vh;
}

.ui{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.7);
    padding:12px;
    border-radius:10px;
    border:1px solid #1e88aa;
}

button { background: #0088cc; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; margin-right: 5px; }
        button:hover { background: #00aaff; }
</style>
</head>

<body>

<div class="ui">
    <b>Parabolic Equation</b><br><br>
    

    Índice da lente:
    <span id="nLabel">1.45</span><br>

    <input
        type="range"
        min="1"
        max="3"
        step="0.01"
        value="1.45"
        oninput="updateLens(this.value)"
    >
     <br>
    <p>Fonte: </p>
    <button onclick="setSource('gaussian')">Gaussian</button>
    <button onclick="setSource('green')">Green</button>
    

</div>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const NX = 320;
const NZ = 180;

const dx = 4;
const dz = 2;

const freq = 100;
const c0 = 1500;

const k0 = 2*Math.PI*freq/c0;

let sourceType = "gaussian";
let lensN = 1.45;

let field = [];

const z0 = (NZ*dz)/2;

const C = {

    add:(a,b)=>({
        re:a.re+b.re,
        im:a.im+b.im
    }),

    sub:(a,b)=>({
        re:a.re-b.re,
        im:a.im-b.im
    }),

    mul:(a,b)=>({
        re:a.re*b.re-a.im*b.im,
        im:a.re*b.im+a.im*b.re
    }),

    scale:(a,s)=>({
        re:a.re*s,
        im:a.im*s
    }),

    div:(a,b)=>{

        const d = b.re*b.re + b.im*b.im;

        return{
            re:(a.re*b.re+a.im*b.im)/d,
            im:(a.im*b.re-a.re*b.im)/d
        };
    }
};

function solveThomas(a,b,c,d){

    const n = d.length;

    const cp = new Array(n);
    const dp = new Array(n);
    const x  = new Array(n);

    cp[0] = C.div(c[0], b[0]);
    dp[0] = C.div(d[0], b[0]);

    for(let i=1;i<n;i++){

        const den =
            C.sub(
                b[i],
                C.mul(a[i], cp[i-1])
            );

        cp[i] = C.div(c[i], den);

        dp[i] =
            C.div(
                C.sub(
                    d[i],
                    C.mul(a[i], dp[i-1])
                ),
                den
            );
    }

    x[n-1] = dp[n-1];

    for(let i=n-2;i>=0;i--){

        x[i] =
            C.sub(
                dp[i],
                C.mul(cp[i], x[i+1])
            );
    }

    return x;
}

function createSource(){

    let u = new Array(NZ);

    for(let i=0;i<NZ;i++){

        const z = i*dz;
        const r = z-z0;

        let amp;

        if(sourceType === "gaussian"){

            amp = Math.exp(-(r*r)/600);

        }else{

            const rr = Math.abs(r)+1;

            amp = Math.cos(k0*rr)/Math.sqrt(rr);
        }

        u[i] = {
            re:amp,
            im:0
        };
    }

    return u;
}

function buildField(){

    field = [];

    let u = createSource();

    const sigma = dz*dz/(2*k0*dx);

    for(let ix=0;ix<NX;ix++){

        const slice = new Array(NZ);

        for(let iz=0;iz<NZ;iz++){

            slice[iz] = {
                re:u[iz].re,
                im:u[iz].im
            };
        }

        field.push(slice);

        const a = [];
        const b = [];
        const c = [];
        const d = [];

        for(let iz=0;iz<NZ;iz++){

            const z = iz*dz;

            let n = 1.0;

            // lente convergente
            const lens =
                ((ix*dx-500)**2)/30000 +
                ((z-z0)**2)/12000;

            if(lens < 1){

                n = lensN;
            }

            const V =
                (k0*dx/2)*(n*n-1);

            a.push({
                re:0,
                im:-sigma
            });

            c.push({
                re:0,
                im:-sigma
            });

            b.push({
                re:1,
                im:2*sigma - V
            });

            d.push(u[iz]);
        }

        // sponge layer simples
        for(let iz=0;iz<NZ;iz++){

            const edge =
                Math.min(iz, NZ-1-iz);

            if(edge < 15){

                const s =
                    edge/15;

                d[iz] = C.scale(d[iz], s);
            }
        }

        u = solveThomas(a,b,c,d);
    }
}

function draw(){

    canvas.width = innerWidth;
    canvas.height = innerHeight;

    ctx.fillStyle = "#020812";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const sx = canvas.width/NX;
    const sy = canvas.height/NZ;

    const t = performance.now()*0.002;

    for(let ix=0;ix<NX;ix++){

        for(let iz=0;iz<NZ;iz++){

            const psi = field[ix][iz];

            const val =
                psi.re*Math.cos(t)
                -
                psi.im*Math.sin(t);

            const A = Math.tanh(Math.abs(val)*4);

            if(val > 0){

                ctx.fillStyle =
                    `rgba(0,220,255,${A})`;

            }else{

                ctx.fillStyle =
                    `rgba(0,40,180,${A})`;
            }

            ctx.fillRect(
                ix*sx,
                iz*sy,
                sx+1,
                sy+1
            );
        }
    }

    // lente
    ctx.strokeStyle = "yellow";
    ctx.lineWidth = 2;

    ctx.beginPath();

    ctx.ellipse(
        500*(canvas.width/(NX*dx)),
        z0*(canvas.height/(NZ*dz)),
        95,
        220,
        0,
        0,
        Math.PI*2
    );

    ctx.stroke();

    requestAnimationFrame(draw);
}

function setSource(s){
    
    sourceType = s;
    buildField();
}

function updateLens(v){

    lensN = parseFloat(v);

    document.getElementById("nLabel")
        .innerText = v;

    buildField();
}

buildField();
draw();

</script>
</body>
</html>
